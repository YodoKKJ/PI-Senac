<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Acadêmico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Tela de carregamento -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="spinner"></div>
      <p>Iniciando banco de dados…</p>
    </div>
  </div>

  <!-- Shell do app -->
  <div id="app" style="display:none">
    <header class="topbar">
      <div class="topbar-row">

        <!-- Marca -->
        <div class="brand">
          <div class="brand-mark">A</div>
          <div>
            <div class="brand-name">Acadêmico</div>
            <div class="brand-sub">
              <span class="brand-dot"></span>
              <span>v1.0</span>
            </div>
          </div>
        </div>

        <!-- Navegação principal -->
        <nav class="topnav" id="topnav"></nav>

        <!-- Lado direito -->
        <div class="top-right">
          <div class="user-chip">
            <div class="avatar">AD</div>
            <div>
              <div class="user-name">Administrador</div>
              <div class="user-role">Admin</div>
            </div>
          </div>
        </div>

      </div>

      <!-- Sub-navegação (páginas dentro de cada seção) -->
      <div class="subnav" id="subnav"></div>
    </header>

    <main>
      <div id="page"></div>
    </main>

    <!-- Nav mobile (bottom) -->
    <nav class="mobile-bottom-nav" id="mobile-nav"></nav>
  </div>

  <!-- Containers globais -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <!-- SQL.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>

  <!-- Módulos da aplicação -->
  <script src="js/icons.js"></script>
  <script src="js/db.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
